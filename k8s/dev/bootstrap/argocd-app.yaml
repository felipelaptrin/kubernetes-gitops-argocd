apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: "9.5.1"
      helm:
        valueFiles:
          - $values/k8s/dev/bootstrap/argocd-values.yaml
    - repoURL: https://github.com/your-org/kubernetes-bootstrap-argocd
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
