apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-public-alb
  namespace: infra
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "PLACEHOLDER"
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/load-balancer-name: "k8s-shared-public-alb"
    alb.ingress.kubernetes.io/backend-protocol-version: GRPC
spec:
  gatewayClassName: alb
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: unused
            group: ""
      allowedRoutes:
        namespaces:
          from: All
