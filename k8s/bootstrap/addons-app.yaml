apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - clusters:
        selector:
          matchLabels:
            managed: "true"
  template:
    metadata:
      name: '{{metadata.annotations.environment}}-addons'
    spec:
      project: default
      source:
        repoURL: '{{metadata.annotations.gitops_repo_url}}'
        path: '{{metadata.annotations.gitops_addons_repo_path}}'
        targetRevision: '{{metadata.annotations.gitops_repo_revision}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
